name: observatory-daily

on:
  schedule:
    - cron: "5 4 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: crypto-observatory-db
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: سحب المستودع
        uses: actions/checkout@v4

      - name: تهيئة Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: تثبيت المكتبات
        run: pip install -r requirements.txt

      - name: تشغيل المرصد
        run: python run_market.py
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: توليد لوحة التحكم
        run: python reporter.py

      - name: حفظ الأرشيف + الموقع
        run: |
          git config user.name "observatory-bot"
          git config user.email "observatory-bot@users.noreply.github.com"
          git add data/ docs/
          git commit -m "observatory: $(date -u +'%F %H:%M UTC')" || echo "لا تغييرات للالتزام"
          git push || echo "تخطّي الدفع"